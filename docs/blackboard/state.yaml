version: 1
updated_at: "2026-03-20"

project:
  name: "MutiData-Nexus"
  state: "release_execution_hold"
  goal: >
    Build one platform that integrates a multimodal data annotation workflow
    and a project risk monitoring workflow with a frontend dashboard, a backend
    controller service, PostgreSQL as the source of truth, and Coze API as the
    AI execution engine.
  detected_repository_stack:
    application_code: "Next.js frontend foundation in apps/web and FastAPI backend foundation in services/controller"
    infrastructure_code: "Alembic baseline in db with PostgreSQL-oriented schema migration"
    repository_status: "design-approved workspace with verified annotation, risk, and review slices implemented"

orchestrator:
  owner: "parent-thread"
  blackboard_writer: true
  notes:
    - "Only the parent thread updates this file."
    - "Child agents must report status changes through handoff messages."

workflow:
  phase: "release_spot_check_blocked_by_seed_data"
  status: "release_execution_hold"
  gates:
    prd_ready: true
    architecture_ready: true
    schema_ready: true
    api_contract_ready: true
    design_tokens_ready: true
    fe_be_parallel_enabled: true
    implementation_complete: true
    qa_passed: true
    release_ready: true
  notes:
