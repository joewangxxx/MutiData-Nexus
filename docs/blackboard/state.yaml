    - "The risk detail frontend no longer exposes the deprecated generate button and now explains that strategy suggestions appear after the project risk workflow runs."
    - "Risk strategy approve/reject is now implemented and QA-verified, including proposed-only decision buttons, backend approve/reject endpoints, idempotent decision replay, and audit persistence."
