    - "Implementation may proceed in parallel for FE and BE against the frozen v1 contract."
    - "FE and BE must escalate contract changes; they may not modify docs/api-contract.md directly."
    - "Frontend and backend foundation slices are implemented and verified locally."
    - "This historical foundation-milestone note was superseded by later verified slices and the Release 1 final acceptance gate."
    - "QA found follow-up issues on PostgreSQL runtime alignment, backend error-code mapping, and frontend numeric contract typing."
    - "The QA fix round resolved the foundation-level runtime and contract alignment issues."
    - "PM accepted the current work as a verified foundation milestone for the next implementation phase, not as MVP acceptance."
    - "General documentation now reflects the verified foundation milestone and remaining gaps."
    - "The approved AI-Assisted Annotation Submission slice is now implemented and QA-verified end to end."
    - "This slice includes the live annotation queue, task detail, AI generate action, callback persistence, revision submission, workflow drilldown, source asset read path, and audit writes."
    - "This historical MVP-gap note was superseded once risk monitoring, workflow visibility, and the remaining approved Release 1 slices were verified."
    - "The approved Project Risk Monitoring E2E slice is now implemented and QA-verified end to end."
    - "This slice uses risk signals as event inputs, risk alerts as persisted current risk snapshots, and risk strategies as persisted mitigation suggestions."
    - "Project page risk posture, risk dashboard, risk item detail, strategy generation, and workflow detail now read the same backend-owned risk facts."
    - "The annotation review flow is now implemented and QA-verified, including reviewer decisions, task/workflow status transitions, audit persistence, and resubmission guardrails for closed tasks."
    - "The annotation Coze integration now uses a backend-owned gateway with environment-based Coze config, synchronous AI result persistence, workflow/coze run tracking, and annotation callback path reuse."
    - "The risk workflow now uses a backend-owned gateway on POST /api/v1/projects/{project_id}/risk-generate with environment-based Coze config, workflow/coze run tracking, synchronous persistence, and accepted-to-callback completion support."
    - "Architect clarified the risk domain to use one physical Coze risk workflow that returns both risk analysis and strategy suggestions."
    - "POST /api/v1/projects/{project_id}/risk-generate is now the only real risk-domain Coze dispatch entry for MVP, and it maps platform state into the provider's project-risk payload shape."
