services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mutidata_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - release_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mutidata_nexus}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: services/controller/Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mutidata_nexus}
      COZE_CALLBACK_SECRET: ${COZE_CALLBACK_SECRET:?COZE_CALLBACK_SECRET is required}
      COZE_ANNOTATION_RUN_URL: ${COZE_ANNOTATION_RUN_URL:?COZE_ANNOTATION_RUN_URL is required}
      COZE_API_TOKEN: ${COZE_API_TOKEN:?COZE_API_TOKEN is required}
      COZE_RISK_RUN_URL: ${COZE_RISK_RUN_URL:?COZE_RISK_RUN_URL is required}
      COZE_RISK_API_TOKEN: ${COZE_RISK_API_TOKEN:?COZE_RISK_API_TOKEN is required}
      COZE_TIMEOUT_SECONDS: ${COZE_TIMEOUT_SECONDS:-15}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "/app/db/alembic.ini", "upgrade", "head"]
    restart: "no"

  bootstrap:
    build:
      context: .
      dockerfile: services/controller/Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mutidata_nexus}
      CONTROLLER_API_AUTH_TOKEN: ${CONTROLLER_API_AUTH_TOKEN:?CONTROLLER_API_AUTH_TOKEN is required}
      RELEASE_BOOTSTRAP_DATA: ${RELEASE_BOOTSTRAP_DATA:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.scripts.release_bootstrap"]
    restart: "no"

  controller:
    build:
      context: .
      dockerfile: services/controller/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mutidata_nexus}
      COZE_CALLBACK_SECRET: ${COZE_CALLBACK_SECRET:?COZE_CALLBACK_SECRET is required}
      COZE_ANNOTATION_RUN_URL: ${COZE_ANNOTATION_RUN_URL:?COZE_ANNOTATION_RUN_URL is required}
      COZE_API_TOKEN: ${COZE_API_TOKEN:?COZE_API_TOKEN is required}
      COZE_RISK_RUN_URL: ${COZE_RISK_RUN_URL:?COZE_RISK_RUN_URL is required}
      COZE_RISK_API_TOKEN: ${COZE_RISK_API_TOKEN:?COZE_RISK_API_TOKEN is required}
      COZE_TIMEOUT_SECONDS: ${COZE_TIMEOUT_SECONDS:-15}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "${CONTROLLER_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/ops/readyz')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      CONTROLLER_API_URL: http://controller:8000
      CONTROLLER_API_AUTH_TOKEN: ${CONTROLLER_API_AUTH_TOKEN:?CONTROLLER_API_AUTH_TOKEN is required}
      PORT: 3000
    depends_on:
      controller:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/readyz >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  release_postgres_data:
