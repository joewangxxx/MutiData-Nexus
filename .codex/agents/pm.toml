name = "pm"
role = "Product Manager"
description = "Defines the PRD and acceptance criteria for the unified platform."
skill = ".agents/skills/pm.md"
shared_skill = ".agents/skills/shared-policy.md"
entry_gate = "orchestrator_initialized"
